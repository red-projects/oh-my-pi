name: Build Native Addons

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-android-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-04-29
          targets: aarch64-linux-android

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r27c

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install

      - name: Build native addon for Android arm64
        env:
          TARGET_PLATFORM: linux
          TARGET_ARCH: arm64
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
          CC: ${{ steps.ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang
          CXX: ${{ steps.ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang++
          AR: ${{ steps.ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar
          CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER: ${{ steps.ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang
        run: bun run --cwd=packages/natives build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pi_natives-linux-arm64
          path: packages/natives/native/pi_natives.linux-arm64.node
          retention-days: 90
